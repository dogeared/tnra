name: tnra-production

services:
  mysql:
    container_name: mysql-prod
    image: mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 1s
      timeout: 3s
      retries: 30
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:3308:3306'
    volumes:
      - 'mysql-db:/var/lib/mysql'
    networks:
      - tnra-production-shared
    env_file: .env

  keycloak:
    container_name: keycloak-prod
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - '127.0.0.1:8180:8080'
    volumes:
      - 'keycloak-data:/opt/keycloak/data'
      - './keycloak/themes/tnra:/opt/keycloak/themes/tnra:ro'
    networks:
      - tnra-production-shared
    env_file: .env

  tnra-landing:
    container_name: tnra-landing
    image: tnra-landing:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/tnra_landing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MAILGUN_KEY_PRIVATE: ${MAILGUN_KEY_PRIVATE}
      MAILGUN_URL: ${MAILGUN_URL}
      TNRA_FOUNDER_EMAIL: ${TNRA_FOUNDER_EMAIL}
      TNRA_NOTIFY_ENABLED: "true"
      VAADIN_PRODUCTIONMODE: "true"
    ports:
      - '127.0.0.1:8081:8080'
    networks:
      - tnra-production-shared
    depends_on:
      mysql:
        condition: service_healthy

  cloudflared:
    profiles: [cloudflare]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - tnra-production-shared

volumes:
  keycloak-data:
  mysql-db:

networks:
  tnra-production-shared:
    name: tnra-production-shared
