name: tnra-production

services:
  mysql:
    container_name: mysql-prod
    image: mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 1s
      timeout: 3s
      retries: 30
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:3308:3306'
    volumes:
      - 'mysql-db:/var/lib/mysql'
    networks:
      - tnra-shared
    env_file: .env

  keycloak:
    container_name: keycloak-prod
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - '127.0.0.1:8180:8080'
    volumes:
      - 'keycloak-data:/opt/keycloak/data'
      - './keycloak/themes/tnra:/opt/keycloak/themes/tnra:ro'
    networks:
      - tnra-shared
    env_file: .env

  tnra-landing:
    container_name: tnra-landing
    image: tnra-landing:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/tnra_landing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MAILGUN_KEY_PRIVATE: ${MAILGUN_KEY_PRIVATE}
      MAILGUN_URL: ${MAILGUN_URL}
      # Binds to tnra.notify.founder-email via Spring relaxed binding (host key stays TNRA_FOUNDER_EMAIL)
      TNRA_NOTIFY_FOUNDER_EMAIL: ${TNRA_FOUNDER_EMAIL}
      TNRA_NOTIFY_ENABLED: "true"
      # Optional HTTP Basic gate for a private pre-launch review. Leave disabled
      # (default) for the public site; set all three (in .env) to password-protect.
      TNRA_BASIC_AUTH_ENABLED: "${TNRA_BASIC_AUTH_ENABLED:-false}"
      TNRA_BASIC_AUTH_USERNAME: "${TNRA_BASIC_AUTH_USERNAME:-}"
      TNRA_BASIC_AUTH_PASSWORD: "${TNRA_BASIC_AUTH_PASSWORD:-}"
      VAADIN_PRODUCTIONMODE: "true"
    ports:
      # Host port is for local/debug only — nginx/Cloudflare reach the container
      # via the tnra-shared network (http://tnra-landing:8080). Override the host
      # port with TNRA_LANDING_PORT in .env if 8081 is taken.
      - '127.0.0.1:${TNRA_LANDING_PORT:-8081}:8080'
    networks:
      - tnra-shared
    depends_on:
      mysql:
        condition: service_healthy

  # Central billing service (Lemon Squeezy). Opt-in via the `billing` profile — it does NOT start on a
  # bare `up` (self-host / billing-off deploys skip it). Bring it up with `--profile billing`, or target
  # it directly (`up -d tnra-billing`), so billing and landing can run individually or all at once and,
  # in future, move to their own VM (point BILLING_DATASOURCE_URL at that VM's database).
  tnra-billing:
    container_name: tnra-billing
    image: tnra-billing:latest
    profiles: [billing]
    restart: unless-stopped
    environment:
      # Listen on 8082 (no application.yml ships in the jar, so override Spring's 8080 default) — keeps
      # the internal route, host port, and docs all on 8082.
      SERVER_PORT: "8082"
      # Defaults to the shared MySQL container; override BILLING_DATASOURCE_URL to point at a remote DB
      # when billing runs on its own VM. Auto-creates the schema on first connect.
      SPRING_DATASOURCE_URL: "${BILLING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/tnra_billing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Flyway owns the schema; validate catches entity/column drift at startup.
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      # Paddle (Merchant of Record) + provisioning — see .env / PRODUCTION.*.md.
      PADDLE_API_KEY: ${PADDLE_API_KEY}
      PADDLE_API_BASE: "${PADDLE_API_BASE:-https://sandbox-api.paddle.com}"
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET}
      PADDLE_PRICE_MONTHLY: ${PADDLE_PRICE_MONTHLY}
      PADDLE_PRICE_YEARLY: ${PADDLE_PRICE_YEARLY}
      BILLING_ADMIN_TOKEN: ${BILLING_ADMIN_TOKEN}
      TNRA_TRIAL_DAYS: "${TNRA_TRIAL_DAYS:-60}"
    ports:
      # Host port for local/debug only — nginx/Cloudflare reach the container via the tnra-shared
      # network (http://tnra-billing:8082). Override the host port with BILLING_PORT in .env.
      - '127.0.0.1:${BILLING_PORT:-8082}:8082'
    networks:
      - tnra-shared
    depends_on:
      mysql:
        condition: service_healthy

  cloudflared:
    profiles: [cloudflare]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - tnra-shared

volumes:
  keycloak-data:
  mysql-db:

networks:
  tnra-shared:
    name: tnra-shared
