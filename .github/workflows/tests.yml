name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run CLI tests
        run: cd tnra-cli-app && mvn --batch-mode test

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run test suite with coverage
        id: verify
        continue-on-error: true
        run: ./mvnw --batch-mode verify

      - name: Checkout badges branch into subdir
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          ref: badges
          path: badges-branch

      - name: Set build badge metadata
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: build_badge
        run: |
          if [ "${{ steps.verify.outcome }}" = "success" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          else
            echo "status=failing" >> "$GITHUB_OUTPUT"
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate coverage badge
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.verify.outcome == 'success'
        uses: cicirello/jacoco-badge-generator@v2.1.0
        with:
          generate-branches-badge: false
          jacoco-csv-file: tnra-app/target/site/jacoco/jacoco.csv
          badges-directory: badges-branch

      - name: Generate build badge
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          curl -fsSL \
            "https://img.shields.io/badge/build-${{ steps.build_badge.outputs.status }}-${{ steps.build_badge.outputs.color }}.svg" \
            -o badges-branch/build.svg

      - name: Commit and push to badges branch
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: badges-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.svg
          if git diff --staged --quiet; then
            echo "No badge changes — skipping commit"
            exit 0
          fi
          git commit -m "chore: update badges (coverage / build)"
          git push origin badges

      - name: Fail job if verification failed
        if: steps.verify.outcome != 'success'
        run: exit 1

      - name: Tag with version from VERSION file
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.verify.outcome == 'success'
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
            if [ -n "$VERSION" ]; then
              # Skip if tag already exists
              if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
                git tag "$VERSION"
                git push origin "$VERSION"
                echo "Tagged $VERSION"
              else
                echo "Tag $VERSION already exists — skipping"
              fi
            fi
          fi
