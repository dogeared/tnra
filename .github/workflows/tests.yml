name: Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/badges/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run test suite with coverage
        id: verify
        continue-on-error: true
        run: ./mvnw --batch-mode verify

      - name: Set build badge metadata
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: build_badge
        run: |
          if [ "${{ steps.verify.outcome }}" = "success" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          else
            echo "status=failing" >> "$GITHUB_OUTPUT"
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate coverage badge
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.verify.outcome == 'success'
        uses: cicirello/jacoco-badge-generator@v2.1.0
        with:
          generate-branches-badge: false
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges

      - name: Generate build badge
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          curl -fsSL \
            "https://img.shields.io/badge/build-${{ steps.build_badge.outputs.status }}-${{ steps.build_badge.outputs.color }}.svg" \
            -o .github/badges/build.svg

      - name: Commit and push the badge
        uses: EndBug/add-and-commit@v9
        with:
          # Commits the generated badge file to the repository
          add: '.github/badges/*.svg'
          message: 'chore: generate JaCoCo coverage badge'
        # Only run on the main branch pushes, not PRs
        if: github.ref == 'refs/heads/main'

      - name: Fail job if verification failed
        if: steps.verify.outcome != 'success'
        run: exit 1
