spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
tnra.notify.schedule=0 0 12 * * ?
tnra.app.base-url=http://localhost:8080
spring.security.oauth2.client.registration.keycloak.client-id=test-client
spring.security.oauth2.client.registration.keycloak.client-secret=test-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.provider.keycloak.authorization-uri=https://example.invalid/realms/tnra/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=https://example.invalid/realms/tnra/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=https://example.invalid/realms/tnra/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.user-name-attribute=sub
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=https://example.invalid/realms/tnra/protocol/openid-connect/certs
