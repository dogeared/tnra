spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:localdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update

# Provide sensible local defaults so boot does not fail on missing placeholders.
tnra.notify.schedule=${TNRA_NOTIFY_SCHEDULE:0 0 12 * * ?}
pq.refresh.schedule=${PQ_REFRESH_SCHEDULE:0 52 7 * * ?}

# Allow local boot without requiring Okta secrets; env vars still override.
spring.security.oauth2.client.registration.okta.client-id=${OKTA_OAUTH2_CLIENT_ID:test-client}
spring.security.oauth2.client.registration.okta.client-secret=${OKTA_OAUTH2_CLIENT_SECRET:test-secret}
spring.security.oauth2.client.registration.okta.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.okta.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.okta.scope=openid,profile,email
spring.security.oauth2.client.provider.okta.authorization-uri=${OKTA_OAUTH2_AUTHORIZATION_URI:https://example.invalid/oauth2/v1/authorize}
spring.security.oauth2.client.provider.okta.token-uri=${OKTA_OAUTH2_TOKEN_URI:https://example.invalid/oauth2/v1/token}
spring.security.oauth2.client.provider.okta.user-info-uri=${OKTA_OAUTH2_USER_INFO_URI:https://example.invalid/oauth2/v1/userinfo}
spring.security.oauth2.client.provider.okta.user-name-attribute=sub
spring.security.oauth2.client.provider.okta.jwk-set-uri=${OKTA_OAUTH2_JWK_SET_URI:https://example.invalid/oauth2/v1/keys}
