<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TNRA Offline</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f4f6fb 0%, #ffffff 100%);
      color: #111827;
    }

    .card {
      width: min(90vw, 420px);
      padding: 24px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.12);
      text-align: center;
    }

    img {
      width: 72px;
      height: 72px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      line-height: 1.45;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/images/pwa-icon.svg" alt="TNRA" />
    <h1>You're Offline</h1>
    <p>TNRA is still installed on your device. Reconnect to sync and continue where you left off.</p>
  </main>
</body>
</html>
