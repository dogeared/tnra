<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TNRA Offline Draft</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #d6deeb;
      --action: #0f766e;
      --action-hover: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #e2e8f0 0%, var(--bg) 45%, #f8fafc 100%);
      color: var(--ink);
    }

    main {
      width: min(920px, 96vw);
      margin: 1rem auto 2rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: 1rem;
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .hero img {
      width: 48px;
      height: 48px;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .status {
      margin-top: 0.65rem;
      font-weight: 600;
      color: #8b5e00;
    }

    .status.online {
      color: #166534;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 1rem;
    }

    .group {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.85rem;
      background: #fcfdff;
    }

    .group h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
    }

    label {
      display: block;
      margin: 0.45rem 0;
      font-size: 0.92rem;
    }

    input,
    textarea {
      width: 100%;
      margin-top: 0.25rem;
      border: 1px solid #c7d2e4;
      border-radius: 8px;
      padding: 0.52rem 0.6rem;
      font: inherit;
      background: #ffffff;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .actions button {
      border: 0;
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      background: var(--action);
      color: #ffffff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .actions button:hover {
      background: var(--action-hover);
    }

    .hint {
      margin-top: 0.65rem;
      font-size: 0.86rem;
      color: var(--muted);
    }

    @media (max-width: 780px) {
      main {
        padding: 0.75rem;
      }

      .grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <img src="/images/pwa-icon.svg" alt="TNRA" />
      <div>
        <h1>Offline TNRA Draft</h1>
        <p>Keep writing while disconnected. TNRA will sync this draft and optional completion once online.</p>
        <div id="connection-status" class="status" aria-live="polite"></div>
      </div>
    </section>

    <section class="group">
      <h2>Intro</h2>
      <label>What I Don't Want You To Know
        <textarea id="intro-widwytk"></textarea>
      </label>
      <label>Kryptonite
        <input id="intro-kryptonite" type="text" />
      </label>
      <label>What and When
        <textarea id="intro-what-and-when"></textarea>
      </label>
    </section>

    <section class="grid">
      <section class="group">
        <h2>Personal</h2>
        <label>Best
          <textarea id="personal-best"></textarea>
        </label>
        <label>Worst
          <textarea id="personal-worst"></textarea>
        </label>
      </section>

      <section class="group">
        <h2>Family</h2>
        <label>Best
          <textarea id="family-best"></textarea>
        </label>
        <label>Worst
          <textarea id="family-worst"></textarea>
        </label>
      </section>

      <section class="group">
        <h2>Work</h2>
        <label>Best
          <textarea id="work-best"></textarea>
        </label>
        <label>Worst
          <textarea id="work-worst"></textarea>
        </label>
      </section>

      <section class="group">
        <h2>Stats</h2>
        <div class="stats-grid">
          <label>Exercise<input id="stats-exercise" type="number" min="0" /></label>
          <label>Meditate<input id="stats-meditate" type="number" min="0" /></label>
          <label>Pray<input id="stats-pray" type="number" min="0" /></label>
          <label>Read<input id="stats-read" type="number" min="0" /></label>
          <label>GTG<input id="stats-gtg" type="number" min="0" /></label>
          <label>Meetings<input id="stats-meetings" type="number" min="0" /></label>
          <label>Sponsor<input id="stats-sponsor" type="number" min="0" /></label>
        </div>
      </section>
    </section>

    <section class="actions">
      <button id="sync-now" type="button">Sync Now</button>
      <label><input id="finish-after-sync" type="checkbox" /> Finish post after sync</label>
    </section>

    <p id="sync-message" class="hint" aria-live="polite">Draft saves locally as you type.</p>
  </main>

  <script>
    (() => {
      const DRAFT_KEY = "tnra:posts:offline-draft:v1";
      const ACTIONS_KEY = "tnra:posts:offline-actions:v1";
      const SYNC_INTERVAL_MS = 15000;

      const statusEl = document.getElementById("connection-status");
      const syncMessageEl = document.getElementById("sync-message");
      const finishAfterSyncEl = document.getElementById("finish-after-sync");

      const fieldMap = [
        { id: "intro-widwytk", path: ["intro", "widwytk"] },
        { id: "intro-kryptonite", path: ["intro", "kryptonite"] },
        { id: "intro-what-and-when", path: ["intro", "whatAndWhen"] },
        { id: "personal-best", path: ["personal", "best"] },
        { id: "personal-worst", path: ["personal", "worst"] },
        { id: "family-best", path: ["family", "best"] },
        { id: "family-worst", path: ["family", "worst"] },
        { id: "work-best", path: ["work", "best"] },
        { id: "work-worst", path: ["work", "worst"] },
        { id: "stats-exercise", path: ["stats", "exercise"], numeric: true },
        { id: "stats-meditate", path: ["stats", "meditate"], numeric: true },
        { id: "stats-pray", path: ["stats", "pray"], numeric: true },
        { id: "stats-read", path: ["stats", "read"], numeric: true },
        { id: "stats-gtg", path: ["stats", "gtg"], numeric: true },
        { id: "stats-meetings", path: ["stats", "meetings"], numeric: true },
        { id: "stats-sponsor", path: ["stats", "sponsor"], numeric: true }
      ];

      let syncing = false;

      function setByPath(target, path, value) {
        let node = target;
        for (let i = 0; i < path.length - 1; i += 1) {
          const key = path[i];
          if (!node[key] || typeof node[key] !== "object") {
            node[key] = {};
          }
          node = node[key];
        }
        node[path[path.length - 1]] = value;
      }

      function getByPath(source, path) {
        let node = source;
        for (let i = 0; i < path.length; i += 1) {
          if (node == null || typeof node !== "object") {
            return undefined;
          }
          node = node[path[i]];
        }
        return node;
      }

      function readActions() {
        const raw = localStorage.getItem(ACTIONS_KEY);
        if (!raw) {
          return {};
        }
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (err) {
          return {};
        }
      }

      function saveActions(actions) {
        if (!actions || Object.keys(actions).length === 0) {
          localStorage.removeItem(ACTIONS_KEY);
          return;
        }
        localStorage.setItem(ACTIONS_KEY, JSON.stringify(actions));
      }

      function readDraftFromUi() {
        const draft = { intro: {}, personal: {}, family: {}, work: {}, stats: {} };
        fieldMap.forEach((field) => {
          const element = document.getElementById(field.id);
          if (!element) {
            return;
          }
          const rawValue = `${element.value ?? ""}`.trim();
          const value = field.numeric
            ? (rawValue === "" ? null : Number(rawValue))
            : (rawValue === "" ? null : rawValue);
          setByPath(draft, field.path, value);
        });
        return draft;
      }

      function hasDraftContent(draft) {
        return fieldMap.some((field) => {
          const value = getByPath(draft, field.path);
          return value !== null && value !== undefined && `${value}`.trim() !== "";
        });
      }

      function saveDraft() {
        const draft = readDraftFromUi();
        if (!hasDraftContent(draft)) {
          localStorage.removeItem(DRAFT_KEY);
          return;
        }
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ draft, updatedAt: Date.now() }));
      }

      function loadStoredDraft() {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) {
          return null;
        }
        try {
          const parsed = JSON.parse(raw);
          return parsed && parsed.draft ? parsed : null;
        } catch (err) {
          return null;
        }
      }

      function restoreDraftToUi(storedDraft) {
        if (!storedDraft || !storedDraft.draft) {
          return;
        }
        fieldMap.forEach((field) => {
          const element = document.getElementById(field.id);
          if (!element) {
            return;
          }
          const value = getByPath(storedDraft.draft, field.path);
          element.value = value == null ? "" : `${value}`;
        });
      }

      async function fetchInProgressPost() {
        const response = await fetch("/api/v1/in_progress", {
          method: "GET",
          credentials: "same-origin",
          headers: { Accept: "application/json" }
        });
        if (response.status === 404) {
          return null;
        }
        if (!response.ok) {
          throw new Error(`Unable to read in-progress post (${response.status})`);
        }
        return response.json();
      }

      async function startInProgressPost() {
        const response = await fetch("/api/v1/start_from_app", {
          method: "GET",
          credentials: "same-origin",
          headers: { Accept: "application/json" }
        });
        if (!response.ok) {
          throw new Error(`Unable to start post (${response.status})`);
        }
        return response.json();
      }

      async function pushPost(post) {
        const response = await fetch("/api/v1/in_progress", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify(post)
        });
        if (!response.ok) {
          throw new Error(`Unable to sync draft (${response.status})`);
        }
      }

      async function finishPost() {
        const response = await fetch("/api/v1/finish_from_app", {
          method: "POST",
          credentials: "same-origin",
          headers: { Accept: "application/json" }
        });
        if (!response.ok) {
          throw new Error(`Unable to finish post (${response.status})`);
        }
      }

      function mergeDraft(post, draft) {
        return {
          ...post,
          intro: { ...(post.intro || {}), ...(draft.intro || {}) },
          personal: { ...(post.personal || {}), ...(draft.personal || {}) },
          family: { ...(post.family || {}), ...(draft.family || {}) },
          work: { ...(post.work || {}), ...(draft.work || {}) },
          stats: { ...(post.stats || {}), ...(draft.stats || {}) }
        };
      }

      async function syncDraft() {
        if (syncing || !navigator.onLine) {
          return;
        }

        const stored = loadStoredDraft();
        const actions = readActions();
        if (!stored && !actions.finishAfterSync) {
          return;
        }

        syncing = true;
        try {
          let serverPost = await fetchInProgressPost();
          if (stored && (!serverPost || serverPost.state !== "IN_PROGRESS")) {
            serverPost = await startInProgressPost();
          }

          if (stored) {
            const merged = mergeDraft(serverPost, stored.draft);
            await pushPost(merged);
            localStorage.removeItem(DRAFT_KEY);
          }

          if (actions.finishAfterSync) {
            if (!serverPost || serverPost.state !== "IN_PROGRESS") {
              serverPost = await fetchInProgressPost();
            }
            if (serverPost && serverPost.state === "IN_PROGRESS") {
              await finishPost();
              saveActions({});
            }
          }

          syncMessageEl.textContent = "Offline draft synced successfully. Return to /posts to continue.";
        } catch (err) {
          syncMessageEl.textContent = "Sync queued. TNRA will retry automatically when online.";
        } finally {
          syncing = false;
        }
      }

      function refreshConnectionStatus() {
        statusEl.textContent = navigator.onLine
          ? "Online. Sync can run now."
          : "Offline mode. Draft is saved locally on this device.";
        statusEl.classList.toggle("online", navigator.onLine);
      }

      function init() {
        const storedDraft = loadStoredDraft();
        if (storedDraft) {
          restoreDraftToUi(storedDraft);
        }

        const actions = readActions();
        finishAfterSyncEl.checked = Boolean(actions.finishAfterSync);

        document.querySelectorAll("input, textarea").forEach((element) => {
          element.addEventListener("input", saveDraft);
          element.addEventListener("change", saveDraft);
        });

        finishAfterSyncEl.addEventListener("change", () => {
          const nextActions = { ...readActions() };
          if (finishAfterSyncEl.checked) {
            nextActions.finishAfterSync = true;
          } else {
            delete nextActions.finishAfterSync;
          }
          saveActions(nextActions);
        });

        document.getElementById("sync-now").addEventListener("click", () => {
          saveDraft();
          syncDraft();
        });

        window.addEventListener("online", () => {
          refreshConnectionStatus();
          syncDraft();
        });
        window.addEventListener("focus", () => {
          if (navigator.onLine) {
            syncDraft();
          }
        });
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            syncDraft();
          }
        });

        window.addEventListener("offline", refreshConnectionStatus);
        window.setInterval(syncDraft, SYNC_INTERVAL_MS);

        refreshConnectionStatus();
        if (navigator.onLine) {
          syncDraft();
        }
      }

      init();
    })();
  </script>
</body>
</html>
