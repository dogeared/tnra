# Test config: H2 in MySQL-compatibility mode, schema generated from JPA entities (Flyway off).
# Mirrors the tnra-app test setup so the MySQL Flyway migrations are never run against H2.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
# Lemon Squeezy config is blank in tests; nothing should call out to it.
lemonsqueezy.api-key=
lemonsqueezy.store-id=
lemonsqueezy.webhook-secret=test-webhook-secret
lemonsqueezy.variant.monthly=test-monthly
lemonsqueezy.variant.yearly=test-yearly
billing.trial-days=60
