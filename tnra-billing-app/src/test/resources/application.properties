# Test config: H2 in MySQL-compatibility mode, schema generated from JPA entities (Flyway off).
# Mirrors the tnra-app test setup so the MySQL Flyway migrations are never run against H2.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
# Paddle config is blank in tests; nothing should call out to it.
paddle.api-key=
paddle.api-base=https://sandbox-api.paddle.com
paddle.webhook-secret=test-webhook-secret
paddle.price.monthly=test-monthly
paddle.price.yearly=test-yearly
billing.trial-days=60
billing.admin-token=test-admin-token
