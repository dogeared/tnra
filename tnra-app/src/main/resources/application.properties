spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.maximumPoolSize=8
server.forward-headers-strategy=framework
server.servlet.session.timeout=30d
# Make JSESSIONID a persistent cookie so it survives browser restarts; without a
# max-age it's a browser-session cookie dropped on close, logging users out long
# before the 30-day server session expires.
server.servlet.session.cookie.max-age=30d
