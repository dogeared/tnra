# secretlint-disable @secretlint/secretlint-rule-pattern
# temporarily disable until moved to entering environment variables for this
---
services:

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: https://auth.dev.dogeared.dev
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - '127.0.0.1:8180:8080'
    volumes:
      - 'keycloak-data:/opt/keycloak/data'
      - './keycloak:/opt/keycloak/data/import:ro'
      - './keycloak/themes/tnra:/opt/keycloak/themes/tnra:ro'
    networks:
      - tnra-shared

  mysql:
    container_name: mysql
    image: mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 1s
      timeout: 3s
      retries: 30
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tnra
    ports:
      - '127.0.0.1:3307:3306'
    volumes:
      - 'mysql-db:/var/lib/mysql'
      - './mysql:/docker-entrypoint-initdb.d:ro'
    networks:
      - tnra-shared
  tnra-landing:
    container_name: tnra-landing
    build:
      context: ./landing
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/tnra_landing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TNRA_NOTIFY_ENABLED: "false"
      TNRA_FOUNDER_EMAIL: ${TNRA_FOUNDER_EMAIL:-micah.silverman@snyk.io}
    ports:
      - '127.0.0.1:8081:8080'
    networks:
      - tnra-shared
    depends_on:
      mysql:
        condition: service_healthy

  proxy:
    container_name: proxy
    image: nginx:latest
    volumes:
      - './nginx/templates:/etc/nginx/templates'
      - './nginx/.cert:/etc/nginx/certs'
      - './nginx/sites:/etc/nginx/sites:ro'
    ports:
      - '443:443'
    networks:
      - tnra-shared
    depends_on:
      - tnra-landing
volumes:
  keycloak-data:
  mysql-db:

networks:
  tnra-shared:
    name: tnra-shared
