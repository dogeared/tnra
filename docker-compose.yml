# Infrastructure services — MySQL, Keycloak, Nginx proxy
# App containers are provisioned per-group by tnra-cli
---
services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '127.0.0.1:8180:8080'
    volumes:
      - 'keycloak-data:/opt/keycloak/data'
      - './keycloak:/opt/keycloak/data/import:ro'
      - './keycloak/themes/tnra:/opt/keycloak/themes/tnra:ro'
    networks:
      - tnra-shared

  mysql:
    container_name: mysql
    image: mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 1s
      timeout: 3s
      retries: 30
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:3307:3306'
    volumes:
      - 'mysql-db:/var/lib/mysql'
    networks:
      - tnra-shared

  proxy:
    container_name: proxy
    image: nginx:latest
    volumes:
      - './nginx/templates:/etc/nginx/templates'
      - './nginx/.cert:/etc/nginx/certs'
      - './nginx/sites:/etc/nginx/sites:ro'
    ports:
      - '443:443'
    networks:
      - tnra-shared

volumes:
  keycloak-data:
  mysql-db:

networks:
  tnra-shared:
    name: tnra-shared
